<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Formulaire d'inscription</h2>

    <form method="POST" enctype="multipart/form-data">
        
        <fieldset>
            <legend>Informations Personnelles</legend>
            
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required autocomplete="family-name">
            </div>

            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" required autocomplete="given-name">
            </div>

            <div class="form-group">
                <label for="email">Adresse Email :</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="tel">Téléphone :</label>
                <input type="tel" id="tel" name="tel" required autocomplete="tel"
                       pattern="^0[1-9]([-. ]?[0-9]{2}){4}$"
                       title="Format attendu : 10 chiffres commençant par 0">
            </div>

            <div class="form-group">
                <label for="ddn">Date de naissance :</label>
                <input type="date" id="ddn" name="ddn" required autocomplete="bday" max="2008-03-14">
            </div>
        </fieldset>

        <fieldset>
            <legend>Sécurité</legend>

            <div class="form-group">
                <label for="mdp">Mot de passe :</label>
                <input type="password" id="mdp" name="mdp" required autocomplete="new-password"
                       pattern="(?=.*\d)(?=.*[A-Z]).{8,}"
                       title="Le mot de passe doit contenir au moins 8 caractères, dont 1 majuscule et 1 chiffre.">
            </div>

            <div class="form-group">
                <label for="cmdp">Confirmation du mot de passe :</label>
                <input type="password" id="cmdp" name="cmdp" required autocomplete="new-password"
                       pattern="(?=.*\d)(?=.*[A-Z]).{8,}"
                       title="Doit être identique au mot de passe (min 8 caractères, 1 majuscule, 1 chiffre).">
            </div>
        </fieldset>

        <fieldset>
            <legend>Profil Utilisateur</legend>

            <div class="form-group">
                <label for="pays">Pays de résidence :</label>
                <input list="liste-pays" id="pays" name="pays" required autocomplete="country-name">
                <datalist id="liste-pays">
                    <option value="France">
                    <option value="Maroc">
                    <option value="Canada">
                    <option value="Belgique">
                    <option value="Suisse">
                </datalist>
            </div>

            <div class="form-group">
                <label>Genre :</label>
                <div class="radio-group">
                    <input type="radio" id="genre_h" name="genre" value="Homme" required>
                    <label for="genre_h">Homme</label>
                    
                    <input type="radio" id="genre_f" name="genre" value="Femme" required>
                    <label for="genre_f">Femme</label>
                    
                    <input type="radio" id="genre_a" name="genre" value="Autre" required>
                    <label for="genre_a">Autre</label>
                </div>
            </div>

            <div class="form-group">
                <label>Centres d'intérêt :</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="interet_tech" name="interet" value="Technologie">
                    <label for="interet_tech">Technologie</label>

                    <input type="checkbox" id="interet_sport" name="interet" value="Sport">
                    <label for="interet_sport">Sport</label>

                    <input type="checkbox" id="interet_art" name="interet" value="Art">
                    <label for="interet_art">Art</label>
                </div>
            </div>

            <div class="form-group">
                <label for="bio">Biographie (max 200 caractères) :</label>
                <textarea id="bio" name="bio" rows="4" maxlength="200"  required></textarea>
            </div>

            <div class="form-group">
                <label for="photo">Photo de profil :</label>
                <input type="file" id="photo" name="photo" accept="image/*" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Validation</legend>
            <div class="form-group">
                <input type="checkbox" id="cgu" name="cgu" required>
                <label for="cgu" style="display:inline;">J'accepte les Conditions Générales d'Utilisation</label>
            </div>
        </fieldset>

        <button type="submit">S'inscrire</button>
    </form>

</body>
</html>
